# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: 3

vars:
  DOCKER_IMAGE: golang:alpine

tasks:
  test-u:
    desc: Unit tests
    cmds:
      - |
        docker run --rm \
          -v "{{.USER_WORKING_DIR}}:/workspace" \
          -w /workspace \
          {{.DOCKER_IMAGE}} \
          sh -c "go test -v ./..."

  test-m:
    desc: Mutation tests (avito-tech/go-mutesting)
    cmds:
      - |
        docker run --rm \
          -v "{{.USER_WORKING_DIR}}:/workspace" \
          -w /workspace \
          {{.DOCKER_IMAGE}} \
          sh -c "apk add --no-cache build-base git diffutils && \
            go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@latest && \
            go-mutesting ./..."

  test:
    desc: All tests (unit + mutation)
    cmds:
      - task: test-u
      - task: test-m

  doc:
    desc: "Package docs (pkgsite) at http://localhost:8080/github.com/omcrgnt/sdi@v0.6.0"
    interrupt: true
    cmds:
      - |
        docker run --rm -it --init -p 8080:8080 \
          -v "{{.USER_WORKING_DIR}}:/workspace" \
          -w /workspace \
          {{.DOCKER_IMAGE}} \
          sh -c "apk add --no-cache git && \
            exec go run golang.org/x/pkgsite/cmd/pkgsite@latest -http=0.0.0.0:8080"
